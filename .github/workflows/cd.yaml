# ============================================================
# CD Workflow — tdd_example Flutter loyihasi
# Trigger: faqat main branch ga merge bo'lganda (release)
# Nima qiladi: sign → build release APK → Firebase Dist. deploy
# ============================================================

name: Flutter CD

on:
  push:
    branches: [main]       # Faqat main ga merge bo'lganda ishga tushadi
  workflow_dispatch:       # Qo'lda ham ishga tushirish mumkin (GitHub UI dan)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # ANDROID RELEASE + FIREBASE APP DISTRIBUTION
  # ──────────────────────────────────────────────
  deploy_android:
    name: Deploy Android → Firebase
    runs-on: ubuntu-latest

    steps:
      # 1. Kodni yuklab olish
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Flutter o'rnatish
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.5"
          channel: stable
          cache: true

      # 3. Java o'rnatish (Android build uchun kerak)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      # 4. Paketlarni yuklab olish
      - name: Install dependencies
        run: flutter pub get

      # 5. Kod generatsiyasi (freezed, injectable, auto_route)
      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      # 6. Keystore faylini GitHub Secret dan dekod qilamiz
      #    base64 -i keystore.jks | pbcopy → KEYSTORE_BASE64 secret ga
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/keystore.jks

      # 7. key.properties faylini dinamik yaratamiz
      #    android/app/build.gradle shu faylni o'qiydi signing uchun
      - name: Create key.properties
        run: |
          cat > android/key.properties <<KEYEOF
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../keystore.jks
          KEYEOF

      # 8. Release APK build
      #    --dart-define orqali environment o'zgaruvchilari kiritiladi
      - name: Build release APK
        run: |
          flutter build apk \
            --release \
            --dart-define=BASE_URL=${{ secrets.BASE_URL }} \
            --dart-define=DEV_MODE=false

      # 9. Firebase App Distribution ga deploy
      #    FIREBASE_APP_ID_ANDROID: Firebase Console → Project settings → Your apps
      #    FIREBASE_TOKEN: firebase login:ci buyrug'i bilan olinadi
      - name: Deploy to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: testers
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: |
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Message: ${{ github.event.head_commit.message }}