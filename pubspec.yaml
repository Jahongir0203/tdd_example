name: tdd_example
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.11.3
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  bloc: ^9.2.1
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  injectable: ^3.0.0
  auto_route: ^11.1.0
  skeletonizer: ^2.1.3
  get_it: ^9.2.1
  dio_cache_interceptor: ^4.0.6
  alice: ^1.0.0
  internet_connection_checker_plus: ^3.0.0
  alice_dio: ^1.0.7
  path_provider: ^2.1.5
  http_cache_hive_store: ^5.1.0
  dartz: ^0.10.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  build_runner: ^2.15.0
  json_serializable: ^6.14.0
  injectable_generator: ^3.0.2
  auto_route_generator: ^10.5.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.5




